<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>西班牙 2026</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B1220">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <div class="countdown-badge" id="countdown">⏳ <span>計算中…</span></div>
    <div class="header-content">
      <div class="trip-badge">🇪🇸 Spain Trip 2026</div>
      <h1 id="header-title">Day 1 Madrid 抵達</h1>
    </div>
  </header>

  <div class="nav-scroll" id="date-nav"></div>

  <div class="container" id="content-area"></div>

  <div class="footer">
    西班牙 2026 • 旅程手帳<br>
    Designed for offline use
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-btn active" data-tab="plan"><span>🗓️</span>行程</div>
    <div class="bottom-nav-btn" data-tab="stay"><span>🏨</span>住宿</div>
    <div class="bottom-nav-btn" data-tab="tips"><span>📝</span>提醒</div>
    <div class="bottom-nav-btn" data-tab="check"><span>✅</span>清單</div>
  </nav>

  <!-- Checklist Modal -->
  <div class="modal" id="checklistModal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div class="modal-title">快速清單（離線保存）</div>
          <div class="modal-sub">勾選會儲存在本機，不怕沒網路</div>
        </div>
        <button class="xbtn" id="closeChecklist" aria-label="關閉">✕</button>
      </div>

      <ul class="checklist" id="checklist">
        <li><label><input type="checkbox" data-key="passport">護照 / 保險 / 影本</label></li>
        <li><label><input type="checkbox" data-key="tickets">車票/門票：王宮、普拉多、聖家堂、奎爾</label></li>
        <li><label><input type="checkbox" data-key="power">轉接頭 / 充電器 / 行動電源</label></li>
        <li><label><input type="checkbox" data-key="money">信用卡 / 現金 / Apple Pay</label></li>
        <li><label><input type="checkbox" data-key="sim">eSIM / 網路方案</label></li>
        <li><label><input type="checkbox" data-key="med">常備藥 / OK 繃</label></li>
      </ul>

      <div class="modal-actions">
        <button class="btn" id="resetChecklist">清空</button>
        <button class="btn primary" id="doneChecklist">完成</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
